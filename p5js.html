<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>p5.js | Suyash Chitrakar</title>
  <link rel="stylesheet" href="assets/css/site.css">
  <link rel="icon" type="image/png" href="./assets/img/circle-128.png">
</head>
<body class="work-list-page" data-site-root="." data-site-section="p5js">
  
  <main class="work-list-main">
    <section class="work-list-intro">
      <h1 class="work-list-title">Creative Coding</h1>
      <p class="work-list-subtitle">Interactive and generative projects spanning identity systems, interfaces, and algorithmic image-making.</p>
    </section>
    <div id="loading" class="loading-state">Loading projects...</div>
    <section id="design-grid" class="work-list-rows"></section>
  </main>

  <script src="assets/js/work-listings.js"></script>
  <script src="assets/js/site-header.js"></script>
  <script src="assets/js/header-dropdown.js"></script>
  
  <script>
    // Project slug mapping for URLs
    const projectSlugs = {
      'Interactive Identity for X-Journal I': 'p5js1',
      'Interactive Identity for X-Journal II': 'p5js3',
      'Hierarchy': 'p5js4',
      'No Meaning Required': 'interrupting-the-grid',
      'Photographing Particles': 'photographing-particles',
      'Senior Finals': 'senior-finals'
    };

    const projectDescriptions = {
      'Interactive Identity for X-Journal I': 'Motion-led publication identity experiments built with p5.js and responsive visual behaviors.',
      'Interactive Identity for X-Journal II': 'A second round of interactive identity studies extending the journal system into new visual logic.',
      'Hierarchy': 'A particle system built from three random words — triangle, bright, tired — about systems designed for you to never escape.',
      'No Meaning Required': 'Circles placed across a strict grid, their position and size driven by randomness, but never enough to break the structure holding them.',
      'Photographing Particles': 'A particle-based generative system where cursor movement and clicks capture moments in motion, then made permanent by the plotter.',
      'Senior Finals': 'Plotter-driven generative compositions developed for a senior exhibition.'
    };

    const projectImageOverrides = {
      'No Meaning Required': 'assets/img/gen-art/circles/circle-grid-(1).png'
    };

    async function loadP5jsProjects() {
      try {
        const response = await fetch('p5js-projects-data.json');
        if (!response.ok) throw new Error('Failed to load projects');
        
        const projects = await response.json();
        const loadingState = document.getElementById('loading');
        
        const listingItems = projects.map(project => {
          const slug = projectSlugs[project.title];
          return {
            href: slug ? `p5js/${slug}.html` : '',
            title: project.title,
            image: projectImageOverrides[project.title] || project.img,
            description: projectDescriptions[project.title] || '',
            tag: `${project.year} | p5.js`
          };
        });

        window.renderWorkListing({
          containerId: 'design-grid',
          loadingId: 'loading',
          items: listingItems
        });
        
      } catch (error) {
        console.error('Error loading projects:', error);
        document.getElementById('loading').innerHTML = 'Failed to load projects.';
      }
    }

    // Load projects when page loads
    document.addEventListener('DOMContentLoaded', loadP5jsProjects);
  </script>
</body>
</html>
