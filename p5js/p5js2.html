<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Generative Designs | Suyash Chitrakar</title>
  <link rel="stylesheet" href="../assets/css/site.css">
  <link rel="stylesheet" href="../assets/css/p5js2-home.css">
</head>
<body class="p5js2-home-page">
  <header class="home-lite-header">
    <a href="../index.html" class="home-lite-title">Suyash Chitrakar</a>
    <div class="home-lite-right">
      <div class="dropdown">
        <button class="dropdown-toggle works-toggle" id="dropdownMenuButton">All Works</button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="../design.html" class="dropdown-item">design</a>
          <a href="../photography.html" class="dropdown-item">photography</a>
          <a href="../p5js.html" class="dropdown-item">p5.js</a>
          <a href="../gamedesign.html" class="dropdown-item">game design</a>
        </div>
      </div>
    </div>
  </header>

  <main class="p5js2-home-main">
    <section class="p5js2-home-intro">
      <h1 class="p5js2-home-title">Generative Designs</h1>
      <p class="p5js2-home-subtitle">Generative designs exploring the intersection of code and visual art. Made in Processing and printed using a pen-plotter.</p>
    </section>

    <section class="p5js2-home-list" id="gen-rows"></section>
  </main>

  <script src="../assets/js/header-dropdown.js"></script>

  <script>
    const generativeProjects = [
      {
        name: '1267_001.png',
        description: 'My project for the Blick Art Materials end of year show. I won the graphic design category for this piece :)',
        tag: 'Creative Coding | Plotter Studies | 2024',
        src: '../assets/img/gen/a4/1267_001.png'
      },
      {
        name: 'gridcircles_285.png',
        description: 'For this piece I interfered with the plotter while it was drawing.',
        tag: 'Creative Coding | Plotter Studies | 2024',
        src: '../assets/img/gen/a1/g2.png'
      },
      {
        name: '1268_005.png',
        description: 'Made with a custom particle system. The project was inheritly photographic, as I needed to press my mouse in order to capture the state of the system. My mouse movements were controling the perlin noise that influences the movement of the squares.',
        tag: 'Creative Coding | Plotter Studies | 2024',
        src: '../assets/img/gen/a2/1268_005.png'
      },
      {
        name: '1268_003.png',
        description: 'Made with a custom particle system. The project was inheritly photographic, as I needed to press my mouse in order to capture the state of the system. My mouse movements were controling the perlin noise that influences the movement of the squares.',
        tag: 'Creative Coding | Plotter Studies | 2024',
        src: '../assets/img/gen/a3/1268_003.png'
      },
      {
        name: '1268_005.png',
        description: 'Made with a custom particle system. The project was inheritly photographic, as I needed to press my mouse in order to capture the state of the system. My mouse movements were controling the perlin noise that influences the movement of the squares.',
        tag: 'Creative Coding | Plotter Studies | 2024',
        src: '../assets/img/gen/a5/particles.png'
      }
    ];

    function renderProjects() {
      const rowsContainer = document.getElementById('gen-rows');

      rowsContainer.innerHTML = generativeProjects.map((project) => `
        <article class="gen-row">
          <div class="gen-meta">
            <h2 class="gen-title">${project.name}</h2>
            <p class="gen-desc">${project.description}</p>
            <span class="gen-tag">${project.tag}</span>
          </div>
          <div class="gen-thumb">
            <img
              src="${project.src}"
              alt="Generative artwork ${project.name}"
              class="gen-image"
              loading="lazy"
              tabindex="0"
            >
            <div class="zoom-preview" aria-hidden="true"></div>
          </div>
        </article>
      `).join('');
    }

    function setupImageZoom() {
      const hoverSupported = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
      const thumbBlocks = document.querySelectorAll('.gen-thumb');
      const zoomScale = 5;

      thumbBlocks.forEach((thumbBlock) => {
        const image = thumbBlock.querySelector('.gen-image');
        const preview = thumbBlock.querySelector('.zoom-preview');
        if (!image || !preview) {
          return;
        }

        preview.style.backgroundImage = `url("${image.src}")`;

        function showPreview() {
          if (!hoverSupported) {
            return;
          }
          preview.classList.add('visible');
        }

        function hidePreview() {
          preview.classList.remove('visible');
        }

        function updatePreview(event) {
          if (!hoverSupported) {
            return;
          }

          const rect = image.getBoundingClientRect();
          const localX = event.clientX - rect.left;
          const localY = event.clientY - rect.top;

          const clampedX = Math.max(0, Math.min(localX, rect.width));
          const clampedY = Math.max(0, Math.min(localY, rect.height));

          const xPercent = rect.width ? (clampedX / rect.width) * 100 : 50;
          const yPercent = rect.height ? (clampedY / rect.height) * 100 : 50;

          preview.style.backgroundPosition = `${xPercent}% ${yPercent}%`;
          preview.style.backgroundSize = `${zoomScale * 100}%`;

          // Center preview on cursor
          preview.style.left = `${event.clientX}px`;
          preview.style.top  = `${event.clientY}px`;
        }

        image.addEventListener('mouseenter', showPreview);
        image.addEventListener('mousemove', updatePreview);
        image.addEventListener('mouseleave', hidePreview);

        image.addEventListener('focus', () => {
          showPreview();
          preview.style.backgroundPosition = '50% 50%';
          preview.style.backgroundSize = `${zoomScale * 100}%`;
        });

        image.addEventListener('blur', hidePreview);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderProjects();
      setupImageZoom();
    });
  </script>

</body>
</html>
