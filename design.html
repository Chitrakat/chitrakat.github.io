<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Design | Suyash Chitrakar</title>
  <link rel="stylesheet" href="assets/css/site.css">
</head>
<body class="work-list-page" data-site-root="." data-site-section="design">
  
  <main class="work-list-main">
    <section class="work-list-intro">
      <h1 class="work-list-title">Publication Design</h1>
      <p class="work-list-subtitle">Books, literary journals, and editorial systems shaped through layout, typography, and physical sequencing.</p>
    </section>
    <div id="loading" class="loading-state">Loading projects...</div>
    <section id="design-grid" class="work-list-rows"></section>
  </main>

  <script src="assets/js/work-listings.js"></script>
  <script src="assets/js/site-header.js"></script>
  <script src="assets/js/header-dropdown.js"></script>
  
  <script>
    // Project slug mapping for URLs
    const projectSlugs = {
      'Catch Magazine: VOL. 55 NO. 2': 'vol55-2',
      'Catch Magazine: VOL. 56 NO. 1': 'vol56-1', 
      'Catch Magazine: VOL. 56 NO. 2': 'vol56-2',
      'X-JOURNAL': 'x-journal',
      'Lines in The Shed, Ryan Tracy': 'lines'
    };

    // Cover image mapping
    const coverImages = {
      'Catch Magazine: VOL. 55 NO. 2': 'assets/img/design-cover/vol55-2.png',
      'Catch Magazine: VOL. 56 NO. 1': 'assets/img/design-cover/vol56-1.png',
      'Catch Magazine: VOL. 56 NO. 2': 'assets/img/design-cover/vol56-2.png', 
      'X-JOURNAL': 'assets/img/design-cover/x.png',
      'Lines in The Shed, Ryan Tracy': 'assets/img/design-cover/lines.jpg'
    };

    const designDescriptions = {
      'Catch Magazine: VOL. 55 NO. 2': 'Editorial design and typography for a literary issue built around risograph texture and modular inserts.',
      'Catch Magazine: VOL. 56 NO. 1': 'Publication design balancing scanner-based imagery, scale shifts, and paced editorial hierarchy.',
      'Catch Magazine: VOL. 56 NO. 2': 'A postcard-format issue exploring unbound reading, circulation, and collaborative materiality.',
      'X-JOURNAL': 'Cross-disciplinary journal design pairing artwork documentation with a restrained typographic system.',
      'Lines in The Shed, Ryan Tracy': 'A poetry book whose visual identity grows out of decay, label-maker typography, and object-making.'
    };

    async function loadDesignProjects() {
      try {
        const response = await fetch('design-popup/carousel-data.json');
        if (!response.ok) throw new Error('Failed to load projects');
        
        const projects = await response.json();
        const loadingState = document.getElementById('loading');
        
        const listingItems = projects.map(project => {
          const slug = projectSlugs[project.title];
          const coverImage = coverImages[project.title];
          return {
            href: slug ? `design/${slug}.html` : '',
            title: project.title,
            image: coverImage,
            description: designDescriptions[project.title] || '',
            tag: `${project.year} | ${project.kind}`
          };
        });

        window.renderWorkListing({
          containerId: 'design-grid',
          loadingId: 'loading',
          items: listingItems
        });
        
      } catch (error) {
        console.error('Error loading projects:', error);
        document.getElementById('loading').innerHTML = 'Failed to load projects.';
      }
    }

    // Load projects when page loads
    document.addEventListener('DOMContentLoaded', loadDesignProjects);
  </script>
</body>
</html>
